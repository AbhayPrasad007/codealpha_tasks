<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        padding: 20px;
      }

      .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .calculator {
        width: 350px;
        background: #111827;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      }

      .title {
        color: white;
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5rem;
        font-weight: 600;
      }

      .display {
        width: 100%;
        height: 90px;
        background: #1f2937;
        border: none;
        border-radius: 15px;
        color: white;
        font-size: 2rem;
        text-align: right;
        padding: 20px;
        margin-bottom: 20px;
        outline: none;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      button {
        height: 65px;
        border: none;
        border-radius: 12px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      button:hover {
        transform: translateY(-3px);
      }

      button:active {
        transform: scale(0.95);
      }

      .number {
        background: #374151;
        color: white;
      }

      .operator {
        background: #2563eb;
        color: white;
      }

      .special {
        background: #ef4444;
        color: white;
      }

      .equal {
        background: #22c55e;
        color: white;
        grid-column: span 2;
      }

      footer {
        margin-top: 20px;
        text-align: center;
        color: #cbd5e1;
        font-size: 0.9rem;
      }

      footer a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
      }

      footer a:hover {
        color: #93c5fd;
        text-decoration: underline;
      }

      @media (max-width: 400px) {
        .calculator {
          width: 100%;
        }

        button {
          height: 60px;
        }

        .display {
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="calculator">
        <h2 class="title">Calculator</h2>

        <input
          type="text"
          id="display"
          class="display"
          placeholder="0"
          readonly
        />

        <div class="buttons">
          <button class="special" onclick="clearDisplay()">AC</button>
          <button class="special" onclick="deleteLast()">DEL</button>
          <button class="operator" onclick="append('%')">%</button>
          <button class="operator" onclick="append('/')">÷</button>

          <button class="number" onclick="append('7')">7</button>
          <button class="number" onclick="append('8')">8</button>
          <button class="number" onclick="append('9')">9</button>
          <button class="operator" onclick="append('*')">×</button>

          <button class="number" onclick="append('4')">4</button>
          <button class="number" onclick="append('5')">5</button>
          <button class="number" onclick="append('6')">6</button>
          <button class="operator" onclick="append('-')">−</button>

          <button class="number" onclick="append('1')">1</button>
          <button class="number" onclick="append('2')">2</button>
          <button class="number" onclick="append('3')">3</button>
          <button class="operator" onclick="append('+')">+</button>

          <button class="number" onclick="append('0')">0</button>
          <button class="number" onclick="append('.')">.</button>

          <button class="equal" onclick="calculate()">=</button>
        </div>
      </div>

      <footer>
        <p>
          &copy; 2026 Frontend Internship Project • Designed & Developed by
          <a
            href="https://www.linkedin.com/in/abhayprasad701/"
            target="_blank"
            rel="noopener noreferrer"
          >
            Abhay Prasad
          </a>
        </p>
      </footer>
    </div>

    <script>
      const display = document.getElementById("display");

      function append(value) {
        display.value += value;
      }

      function clearDisplay() {
        display.value = "";
      }

      function deleteLast() {
        display.value = display.value.slice(0, -1);
      }

      function calculate() {
        try {
          if (display.value.trim() === "") {
            return;
          }

          display.value = eval(display.value);
        } catch (error) {
          display.value = "Error";

          setTimeout(() => {
            display.value = "";
          }, 1500);
        }
      }

      // Keyboard Support

      document.addEventListener("keydown", (e) => {
        const key = e.key;

        if (
          (key >= "0" && key <= "9") ||
          key === "+" ||
          key === "-" ||
          key === "*" ||
          key === "/" ||
          key === "." ||
          key === "%"
        ) {
          append(key);
        }

        if (key === "Enter") {
          calculate();
        }

        if (key === "Backspace") {
          deleteLast();
        }

        if (key === "Escape") {
          clearDisplay();
        }
      });
    </script>
  </body>
</html>
